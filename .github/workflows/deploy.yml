name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

# Railway auto-deploys the relay when the repo is pushed (connected via API).
# This workflow only handles the frontend (GitHub Pages).

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build with service URLs
        env:
          VITE_RELAY_URL: ${{ vars.RELAY_URL }}
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_PI_URL: ${{ vars.PI_URL }}
          VITE_APP_TITLE: ${{ vars.APP_TITLE }}
          VITE_CLIENT_SLUG: ${{ vars.CLIENT_SLUG }}
          VITE_ROOMS_URL: ${{ vars.ROOMS_URL }}
        run: |
          echo "Building with relay: $VITE_RELAY_URL api: $VITE_API_URL pi: $VITE_PI_URL title: $VITE_APP_TITLE"
          npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

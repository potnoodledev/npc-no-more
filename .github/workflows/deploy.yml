name: Deploy Frontend

on:
  push:
    branches: [deploy/soulcats]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-soulcats
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build with service URLs
        env:
          VITE_RELAY_URL: ${{ vars.RELAY_URL }}
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_PI_URL: ${{ vars.PI_URL }}
          VITE_ROOMS_URL: ${{ vars.ROOMS_URL }}
          VITE_GAME_URL: ${{ vars.GAME_URL }}
          VITE_APP_TITLE: Soulcats
          VITE_CLIENT_SLUG: soulcats
          VITE_DASHBOARD_LABEL: Soulcats
          VITE_DASHBOARD_ROUTE: dashboard
          VITE_CURRENCY_NAME: shinies
          VITE_ACCENT_COLOR: "#baff00"
          VITE_CREATURE_TYPE: cat
          VITE_CREATURE_TYPE_PLURAL: cats
          VITE_RELAY_DEFAULT_NAME: Soulcats Relay
          VITE_NIP05_DOMAIN: soulcats.xyz
          VITE_ADMIN_EMAIL_PLACEHOLDER: admin@soulcats.xyz
          VITE_USER_ROLE: caretaker
          VITE_USER_ROLE_DESCRIPTION: your caretaker profile
        run: |
          echo "Building soulcats frontend..."
          npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

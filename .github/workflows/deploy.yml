name: Deploy Frontend

on:
  push:
    branches: [deploy/apocalypse-radio]
  workflow_dispatch:

concurrency:
  group: deploy-apocalypse-radio
  cancel-in-progress: true

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build with service URLs
        env:
          VITE_RELAY_URL: ${{ vars.RELAY_URL }}
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_PI_URL: ${{ vars.PI_URL }}
          VITE_ROOMS_URL: ${{ vars.ROOMS_URL }}
          VITE_GAME_URL: ${{ vars.GAME_URL }}
          VITE_APP_TITLE: Apocalypse Radio
          VITE_CLIENT_SLUG: apocalypse-radio
          VITE_DASHBOARD_LABEL: Dashboard
          VITE_DASHBOARD_ROUTE: dashboard
          VITE_CURRENCY_NAME: signals
          VITE_ACCENT_COLOR: "#ff4444"
          VITE_CREATURE_TYPE: artist
          VITE_CREATURE_TYPE_PLURAL: artists
          VITE_RELAY_DEFAULT_NAME: Apocalypse Radio Relay
          VITE_NIP05_DOMAIN: apocalypseradio.xyz
          VITE_ADMIN_EMAIL_PLACEHOLDER: admin@apocalypseradio.xyz
          VITE_USER_ROLE: manager
          VITE_USER_ROLE_DESCRIPTION: your label profile
        run: |
          echo "Building apocalypse-radio frontend..."
          npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy dist --prod --token "$VERCEL_TOKEN" --yes --scope paul-gadis-projects

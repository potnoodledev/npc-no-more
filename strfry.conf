##
## Default strfry config
##

# Directory that contains the strfry LMDB database
db = "./strfry-db/"

dbParams {
    # Maximum number of threads/processes that can simultaneously have LMDB transactions open
    maxreaders = 256

    # Size of mmap() to use when loading LMDB (default is 10TB, does not actually allocate memory)
    mapsize = 10995116277760
}

relay {
    # Interface to listen on. Use 0.0.0.0 to listen on all interfaces
    bind = "0.0.0.0"

    # Port to open for the nostr websocket protocol
    port = 7777

    # Set OS-limit on maximum number of open files/sockets (if 0, don't attempt to set this)
    nofiles = 0

    # HTTP header that contains the client's real IP
    realIpHeader = ""

    info {
        # NIP-11: name of this server
        name = "Soulcats Relay"

        # NIP-11: detailed information about relay
        description = "Nostr relay for Soulcats — a social fiction platform for fictional character personas"

        # NIP-11: administrative pubkey
        pubkey = ""

        # NIP-11: alternative contact
        contact = "admin@soulcats.xyz"
    }

    # Maximum accepted incoming websocket frame size (should be larger than max event)
    maxWebsocketPayloadSize = 131072

    # Websocket-level PING message frequency (seconds; 0 to disable)
    autoPingSeconds = 55

    # If TCP keep-alive should be enabled (detect dropped connections to upstream reverse proxy)
    enableTcpKeepalive = false

    # How much uninterrupted CPU time a REQ query should get during its DB scan
    queryTimesliceBudgetMicroseconds = 10000

    # Maximum records that can be returned per filter
    maxFilterLimit = 500

    # Maximum number of subscriptions (concurrent REQs) a connection can have open at any time
    maxSubsPerConnection = 20

    writePolicy {
        # If non-empty, path to an executable script that implements the writePolicy plugin logic
        plugin = ""
    }

    compression {
        # Use permessage-deflate compression if supported by client. Reduces bandwidth, but slight increase in CPU
        enabled = true

        # Maintain a sliding window buffer for each connection. Improves compression, but uses more memory
        slidingWindow = true
    }

    logging {
        # Dump all incoming messages
        dumpInAll = false

        # Dump all incoming EVENT messages
        dumpInEvents = false

        # Dump all incoming REQ/CLOSE messages
        dumpInReqs = false

        # Log performance metrics for initial REQ database scans
        dbScanPerf = false
    }

    numThreads {
        # Threads used for processing REQ filters
        ingester = 3

        # Threads used for reqWorker and�negWorker
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        # Whether to enable negentropy protocol support
        enabled = true

        # Maximum number of events that sync will process before returning an error
        maxSyncEvents = 1000000
    }
}

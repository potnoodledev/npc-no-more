services:
  relay:
    image: ghcr.io/hoytech/strfry:latest
    container_name: nostr-relay
    ports:
      - "7777:7777"
    volumes:
      - relay-data:/app/strfry-db
      - ./strfry.conf:/app/strfry.conf:ro
    command: relay
    restart: unless-stopped

  api:
    build: ./api-service
    container_name: npc-api
    ports:
      - "3456:3456"
    environment:
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION}
    restart: unless-stopped

  pi-bridge:
    build:
      context: .
      dockerfile: pi-bridge/Dockerfile
    container_name: npc-pi-bridge
    ports:
      - "3457:3457"
    volumes:
      - pi-workspace:/workspace
    environment:
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
    restart: unless-stopped

volumes:
  relay-data:
  pi-workspace:

services:
  relay:
    image: ghcr.io/hoytech/strfry:latest
    container_name: nostr-relay
    ports:
      - "7777:7777"
    volumes:
      - relay-data:/app/strfry-db
      - ./strfry.conf:/app/strfry.conf:ro
    command: relay
    restart: unless-stopped

  api:
    build: ./api-service
    container_name: npc-api
    ports:
      - "3456:3456"
    volumes:
      - ./api-service/config:/app/config:ro
    environment:
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION}
    restart: unless-stopped

  pi-bridge:
    build: ./pi-bridge
    container_name: npc-pi-bridge
    ports:
      - "3457:3457"
    volumes:
      - pi-workspace:/workspace
    environment:
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - HF_TOKEN=${HF_TOKEN:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - RELAY_URL=ws://nostr-relay:7777
      - API_URL=http://npc-api:3456
      - CLIENT_SLUG=${VITE_CLIENT_SLUG:-npc-no-more}
      - ROOMS_URL=ws://npc-rooms:2567
      - GAME_SERVICE_URL=http://npc-game:3458
    restart: unless-stopped

  rooms:
    build: ./room-server
    container_name: npc-rooms
    ports:
      - "2567:2567"
    volumes:
      - room-recordings:/data/recordings
    environment:
      - API_URL=http://npc-api:3456
    restart: unless-stopped

  game:
    build: ./game-service
    container_name: npc-game
    ports:
      - "3458:3458"
    volumes:
      - game-data:/data
      - ./branding.json:/app/branding.json:ro
    environment:
      - API_URL=http://npc-api:3456
    restart: unless-stopped

volumes:
  relay-data:
  pi-workspace:
  room-recordings:
  game-data:
